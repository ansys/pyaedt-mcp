[build-system]
build-backend = "flit_core.buildapi"
requires = ["flit_core >=3.2,<4"]

[project]
authors = [
  {name = "ANSYS, Inc.", email = "pyansys.core@ansys.com"},
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering",
  "Topic :: Scientific/Engineering :: Electronic Design Automation (Electromagnetics)",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
description = "Model Context Protocol (MCP) server for Ansys Electronics Desktop (AEDT) through PyAEDT"
keywords = [
  "ansys",
  "aedt",
  "pyaedt",
  "electronics-desktop",
  "hfss",
  "maxwell",
  "icepak",
  "circuit",
  "mcp",
  "model-context-protocol",
  "ai",
  "assistant",
  "electromagnetic-simulation",
  "rf-simulation",
  "thermal-analysis",
]
license = {file = "LICENSE"}
maintainers = [
  {name = "ANSYS, Inc.", email = "pyansys.core@ansys.com"},
]
name = "ansys-aedt-mcp"
readme = "README.md"
requires-python = ">=3.10,<4"
version = "0.1.0"

dependencies = [
  "pyaedt[all]>=0.10.0",
  "fastmcp>=3.2.0,<4.0",
  "ansys-common-mcp>=0.3.0",
  "matplotlib>=3.5.0",
  "tabulate>=0.9.0",
]

[project.optional-dependencies]
tests = [
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.0.0",
  "pytest-mock>=3.15.1",
]

doc = [
  "ansys-sphinx-theme[changelog]==1.8.2",
  "numpydoc==1.10.0",
  "sphinx-autodoc-typehints==3.1.0",
  "sphinx-design>=0.5.0",
  "sphinx-notfound-page==1.1.0",
  "sphinx==8.2.3",
]

dev = [
  "ansys-aedt-mcp[tests,doc]",
  "pre-commit>=4.0",
  "ruff>=0.11.0",
  "mypy>=1.8.0",
  "bandit[toml]>=1.8.0",
]

[project.urls]
Documentation = "https://aedt-mcp.docs.pyansys.com"
Homepage = "https://github.com/ansys/pyaedt-mcp"
Issues = "https://github.com/ansys/pyaedt-mcp/issues"
Repository = "https://github.com/ansys/pyaedt-mcp"

[project.scripts]
ansys-aedt-mcp = "ansys.aedt.mcp.__main__:launcher"

[tool.flit.module]
name = "ansys.aedt.mcp"

[tool.ruff]
line-length = 100
fix = true
format.indent-style = "space"
format.quote-style = "double"
lint.select = [
  "D",   # pydocstyle
  "E",   # pycodestyle
  "F",   # pyflakes
  "I",   # isort
  "N",   # pep8-naming
  "PTH", # flake8-use-pathlib
  "TD",  # flake8-todos
]
lint.ignore = [
  "D100", # Missing docstring in public module
  "D104", # Missing docstring in public package
  "D401", # First line of docstring should be in imperative mood
  "TD002", # Missing author in TODO comments
]
lint.per-file-ignores."!src/**.py" = [ "D" ]
lint.per-file-ignores."__init__.py" = [ "F401" ]
lint.per-file-ignores."tests/**.py" = [ "D", "E501", "N806" ]
lint.isort.combine-as-imports = true
lint.isort.force-sort-within-sections = true
lint.isort.known-first-party = [ "ansys.aedt.mcp" ]
lint.pydocstyle.convention = "numpy"

[tool.mypy]
exclude = [
  "^\\.venv/",
  "^venv/",
  "^build/",
  "^dist/",
]
explicit_package_bases = true
ignore_missing_imports = true
mypy_path = "src"
namespace_packages = true
python_version = "3.10"
strict = false
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
addopts = "--cov=ansys.aedt.mcp --cov-report=term-missing --cov-report=html --cov-report=xml --tb=short -q"
asyncio_default_fixture_loop_scope = "function"
asyncio_mode = "auto"
markers = [
  "integration: marks tests as integration tests (require running AEDT instance)",
  "unit: marks tests as unit tests (do not require running AEDT instance)",
  "slow: Tests that take a long time to run",
]
testpaths = ["tests"]

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv"]
skips = ["B101"]  # Skip assert_used in tests

[tool.uv]
index-strategy = "unsafe-best-match"

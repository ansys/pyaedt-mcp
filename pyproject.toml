[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "ansys-aedt-mcp"
version = "0.0.1"
description = "Model Context Protocol (MCP) server for Ansys Electronics Desktop (AEDT) through PyAEDT"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [
    { name = "ANSYS, Inc.", email = "pyansys.core@ansys.com" }
]
maintainers = [
    { name = "ANSYS, Inc.", email = "pyansys.core@ansys.com" }
]
keywords = [
    "ansys",
    "aedt",
    "pyaedt",
    "electronics-desktop",
    "hfss",
    "maxwell",
    "icepak",
    "circuit",
    "mcp",
    "model-context-protocol",
    "ai",
    "assistant",
    "electromagnetic-simulation",
    "rf-simulation",
    "thermal-analysis"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Electronic Design Automation (Electromagnetics)",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "pyaedt>=0.10.0",
    "fastmcp>=0.1.0",
    "ansys-common-mcp>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.10",
    "black>=23.0",
    "isort>=5.12",
    "mypy>=1.0",
    "flake8>=7.0",
    "pre-commit>=3.0",
]

[project.urls]
Homepage = "https://github.com/ansys-internal/pyaedt-mcp"
Documentation = "https://github.com/ansys-internal/pyaedt-mcp#readme"
Repository = "https://github.com/ansys-internal/pyaedt-mcp"
Issues = "https://github.com/ansys-internal/pyaedt-mcp/issues"

[project.scripts]
ansys-aedt-mcp = "ansys.aedt.mcp.__main__:launcher"

[tool.flit.module]
name = "ansys.aedt.mcp"

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312", "py313"]

[tool.isort]
profile = "black"
line_length = 100
src_paths = ["src", "tests"]

[tool.mypy]
python_version = "3.10"
strict = false
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"
exclude = [
    "^\\.venv/",
    "^venv/",
    "^build/",
    "^dist/",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "integration: marks tests as integration tests (require running AEDT instance)",
    "unit: marks tests as unit tests (do not require running AEDT instance)",
]

[tool.uv]
index-strategy = "unsafe-best-match"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
]

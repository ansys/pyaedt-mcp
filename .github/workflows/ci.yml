name: CI/CD

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
      - main
  schedule:
    - cron: '30 4 * * *'  # Daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
  ON_CI: True
  PYTEST_ARGUMENTS: -vvv --color=yes -ra --durations=25 --maxfail=10
  MAIN_PYTHON_VERSION: "3.11"
  TESTS_PYTHON_VERSION: "3.12"
  PACKAGE_NAME: "ansys-aedt-mcp"
  DOCUMENTATION_CNAME: "aedt-mcp.docs.pyansys.com"

jobs:

  update-changelog:
    name: "Update CHANGELOG (on release)"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to read and write repository contents
      pull-requests: write # Needed to create pull requests
    steps:
      - uses: ansys/actions/doc-deploy-changelog@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  code-style:
    name: "Code style checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed to checkout the code
    steps:
      - name: "Run PyAnsys code style checks"
        uses: ansys/actions/code-style@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  docs-style:
    name: "Documentation style checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed to checkout the code
      checks: write # Needed for reviewdog to create check runs
    steps:
      - name: "Run Ansys documentation style checks"
        uses: ansys/actions/doc-style@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
            token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

  pr-name:
    if: github.event_name == 'pull_request'
    name: "Check the name of the PR"
    permissions:
      contents: read # Needed to checkout the code
      pull-requests: read # Needed to read pull request title for checks
    runs-on: ubuntu-latest
    steps:
      - name: Check commit name
        uses: ansys/actions/check-pr-title@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  actions-security:
    name: "Actions security"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed to checkout and scan workflows
    steps:
      - uses: ansys/actions/check-actions-security@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: 'high'

  vulnerabilities:
    name: "Vulnerabilities"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed to checkout the code
      security-events: write # Needed to create security advisories
      issues: write # Needed to create issues for new advisories
    steps:
      - uses: ansys/actions/check-vulnerabilities@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          python-package-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          dev-mode: ${{ github.ref != 'refs/heads/main' }}
          exit-with-error-on-new-advisory: false

  smoke-tests:
    name: "Build and smoke tests"
    runs-on: ${{ matrix.os }}
    needs: [code-style]
    permissions:
      contents: read # Needed to checkout the code
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: "Build wheelhouse and perform smoke test"
        uses: ansys/actions/build-wheelhouse@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          whitelist-license-check: 'fpdf2'

  test:
    name: "Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [smoke-tests]
    permissions:
      contents: read # Needed to checkout the code
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: "Run unit tests"
        uses: ansys/actions/tests-pytest@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          python-version: ${{ matrix.python-version }}
          pytest-extra-args: '${{ env.PYTEST_ARGUMENTS }} tests --ignore=tests/integration'
          pytest-markers: '-m "not integration and not system"'
          group-dependencies-name: tests

  system-tests-tools-linux:
    name: "System tests (tools, linux)"
    runs-on: [self-hosted, Linux, pyaedt-toolkit]
    needs: [test]
    permissions:
      contents: read # Needed to checkout the code
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      ANSYSEM_ROOT261: '/usr/ansys_inc/v261/AnsysEM'
      ANS_NODEPCHECK: "1"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.TESTS_PYTHON_VERSION }}

      - name: "Set up uv"
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          activate-environment: true
          enable-cache: false
          prune-cache: true
          python-version: ${{ env.TESTS_PYTHON_VERSION }}

      - name: "Install package and test dependencies"
        run: |
          uv sync --group tests

      - name: "Remove Ansys processes (if any)"
        shell: bash
        run: |
          for pid in $(ps -eo pid,comm,args | grep -iE "ansys.inc|ansysem" | grep -v grep | awk '{print $1}'); do
            echo "Killing PID $pid"
            kill -9 "$pid"
          done

      - name: "Run integration tests"
        env:
          PYTHONMALLOC: malloc
          PYTEST_EXTRA_ARGS: ${{ env.PYTEST_ARGUMENTS }}
        run: |
          pytest ${PYTEST_EXTRA_ARGS} tests/integration -m "integration and system"

  build-docs:
    name: "Build documentation"
    runs-on: ubuntu-latest
    needs: [docs-style]
    permissions:
      contents: read # Needed to checkout the code
    steps:
      - name: "Run Ansys documentation building action"
        uses: ansys/actions/doc-build@84b6533ae76f5dde69a1df26c18682160a8121cf # v10.3.5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          dependencies: 'zip libgl1 libglx-mesa0 xvfb'
          sphinxopts: '-W --keep-going'
          group-dependencies-name: doc

  package:
    name: "Package library"
    needs: [test, build-docs]
    runs-on: ubuntu-latest
    permissions:
      attestations: write # Required to upload provenance attestations
      contents: read # Needed to checkout the code
      id-token: write # Required for OIDC authentication to upload provenance attestations
    steps:
      - name: "Build library source and wheel artifacts"
        uses: ansys/actions/build-library@84b6533ae76f5dde69a1df26c18682160a8121cf # v10.3.5
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: false

  doc-deploy-dev:
    name: "Deploy development documentation"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push documentation to gh-pages branch
    needs: [build-docs, package]
    steps:
      - name: "Deploy the latest documentation"
        uses: ansys/actions/doc-deploy-dev@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN  }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  doc-deploy-pr:
    name: "Deploy PR documentation"
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pr-preview')
    runs-on: ubuntu-latest
    needs: [build-docs]
    permissions:
      contents: write # Needed to push documentation to gh-pages branch
    steps:
      - name: "Deploy the PR documentation"
        uses: ansys/actions/doc-deploy-pr@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          maximum-pr-doc-deployments: 10

  release:
    name: "Release project to GitHub and PyPI"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: [package, build-docs, update-changelog]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # Required for GitHub release
      contents: write # Required for GitHub release
    steps:
      - name: "Release to GitHub"
        uses: ansys/actions/release-github@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          library-name: ${{ env.PACKAGE_NAME }}
          add-artifact-attestation-notes: true
          changelog-release-notes: true

      - name: "Release to PyPI"
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          print-hash: true
          packages-dir: dist/${{ env.PACKAGE_NAME }}-artifacts
          skip-existing: false

  doc-deploy-stable:
    name: "Deploy stable documentation"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push documentation to gh-pages branch
    needs: [release]
    steps:
      - name: "Deploy the stable documentation"
        uses: ansys/actions/doc-deploy-stable@84b6533ae76f5dde69a1df26c18682160a8121cf #v10.3.5
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          render-last: '5'
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

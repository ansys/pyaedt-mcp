# Docker Compose for PyAEDT MCP Server
#
# Note: Unlike MAPDL and Mechanical, AEDT does not have a publicly available
# Docker image. This compose file is for reference and local development.
#
# To use AEDT with Docker, you would need:
# 1. A custom AEDT container image (internal/enterprise only)
# 2. AEDT installed on the host machine with proper licensing
#
# For most use cases, run AEDT directly on your machine:
#   Windows: "C:\Program Files\ANSYS Inc\v252\AnsysEM\ansysedt.exe" -grpcsrv 50051
#   Linux:   /ansys_inc/v252/AnsysEM/Linux64/ansysedt -grpcsrv 50051

services:
  # PyAEDT MCP Server
  # Connects to AEDT running on host machine or remote server
  pyaedt-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYANSYS_PYPI_INDEX_URL: ${PYANSYS_PYPI_INDEX_URL:-}
    container_name: pyaedt-mcp
    ports:
      - "8080:8080"  # HTTP transport port
    environment:
      - AEDT_MACHINE=${AEDT_MACHINE:-host.docker.internal}
      - AEDT_PORT=${AEDT_PORT:-50051}
      - AEDT_VERSION=${AEDT_VERSION:-2025.2}
      - AEDT_NON_GRAPHICAL=${AEDT_NON_GRAPHICAL:-true}
      - CONNECT_ON_STARTUP=${CONNECT_ON_STARTUP:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # For connecting to host AEDT
    restart: unless-stopped
    networks:
      - pyaedt-network

networks:
  pyaedt-network:
    driver: bridge

# Usage Examples:
#
# 1. Start AEDT on host machine first:
#    "C:\Program Files\ANSYS Inc\v252\AnsysEM\ansysedt.exe" -grpcsrv 50051
#
# 2. Build and start MCP server:
#    docker compose up -d --build
#
# 3. Check logs:
#    docker compose logs -f pyaedt-mcp
#
# 4. Connect your AI client to http://localhost:8080
#
# 5. Stop the server:
#    docker compose down
#
# Environment Variables:
#   AEDT_MACHINE          - AEDT server hostname (default: host.docker.internal)
#   AEDT_PORT             - AEDT gRPC port (default: 50051)
#   AEDT_VERSION          - AEDT version (default: 2025.2)
#   CONNECT_ON_STARTUP    - Connect to AEDT on startup (default: true)
#   PYANSYS_PYPI_INDEX_URL - Private PyPI for ansys-common-mcp (build-time)
#   AEDT_VERSION - AEDT version (default: 2025.2)
